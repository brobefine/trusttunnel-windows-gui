name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: src
        run: dotnet restore -r win-${{ matrix.arch }}

      - name: Publish
        working-directory: src
        run: >
          dotnet publish TrustTunnelGui.csproj
          -c Release
          -r win-${{ matrix.arch }}
          --self-contained true
          -p:Platform=${{ matrix.arch }}
          -p:WindowsAppSDKSelfContained=true
          -p:PublishSingleFile=false

      - name: Download wintun.dll
        shell: pwsh
        run: |
          $url = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          Invoke-WebRequest -Uri $url -OutFile wintun.zip
          Expand-Archive -Path wintun.zip -DestinationPath wintun-extract -Force
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "x64") { $sub = "amd64" } else { $sub = "arm64" }
          Copy-Item "wintun-extract/wintun/bin/$sub/wintun.dll" -Destination "wintun.dll"

      - name: Stage release
        shell: pwsh
        run: |
          $pub = "src/bin/Release/net8.0-windows10.0.19041.0/win-${{ matrix.arch }}/publish"
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          Copy-Item "$pub/*" -Destination "release" -Recurse -Force
          Copy-Item "wintun.dll" -Destination "release/wintun.dll"
          # Note: trusttunnel_client.exe must be added by end user or via release asset bundle
          New-Item -ItemType File -Force -Path "release/PUT_trusttunnel_client.exe_HERE.txt" | Out-Null

      - name: Zip
        shell: pwsh
        run: |
          $zip = "TrustTunnelGui-${{ matrix.arch }}.zip"
          Compress-Archive -Path "release/*" -DestinationPath $zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrustTunnelGui-${{ matrix.arch }}
          path: TrustTunnelGui-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
